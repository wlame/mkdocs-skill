# Organization documentation standard — GitHub Actions workflow (unversioned docs)
# File: .github/workflows/docs.yml
#
# Triggers: push to main (build + deploy), pull_request (build-only check).
# Deploys via the official GitHub Pages actions (artifact upload), NOT gh-deploy.
#
# Prerequisites:
#   GitHub repo Settings → Pages → Source → GitHub Actions
#
# For versioned docs (mike), use docs-versioned-workflow.yml instead — it deploys
# to a gh-pages branch and requires Source → Deploy from a branch.

name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required for git-revision-date-localized and git-authors plugins
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

      # External links only — internal links are already covered by --strict.
      # Non-blocking: external sites break for reasons unrelated to this repo.
      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: --no-progress --include-fragments site/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
