# Organization documentation standard — mkdocs.yml baseline
# Replace all <PLACEHOLDERS> before use.
# Run: mkdocs build --strict

site_name: <PROJECT NAME>
site_description: <One-line description of what this project does>
site_url: https://<org>.github.io/<repo>/

repo_name: <org>/<repo>
repo_url: https://github.com/<org>/<repo>
edit_uri: edit/main/docs/

strict: true
use_directory_urls: true

theme:
  name: material
  language: en
  logo: assets/logo.svg        # or logo.png; remove line to use text
  favicon: assets/favicon.svg  # or favicon.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode (OS default)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo           # indigo | teal | blue-grey | deep purple | orange
      accent: blue              # blue | cyan | amber | purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs           # Top-level tabs (remove for small docs)
    - navigation.sections
    - navigation.indexes
    - navigation.top            # Back-to-top button
    - navigation.footer         # Previous/next links
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips
    - toc.follow

plugins:
  - search
  - tags
  - privacy
  # social cards are OPTIONAL — enabling them requires mkdocs-material[imaging]
  # plus system cairo libs in CI (see requirements-docs.txt). Off by default.
  # - social:
  #     enabled: !ENV [CI, false]
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - git-authors
  - redirects:
      redirect_maps: {}           # Add old-path: new-path entries here when moving pages
  - glightbox                     # Image zoom on click

  # Uncomment if this is a Python package with public API:
  # - mkdocstrings:
  #     handlers:
  #       python:
  #         options:
  #           show_source: true
  #           show_root_heading: true
  #           show_signature_annotations: true
  # - autorefs

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - def_list
  - abbr
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde

nav:
  - Home: index.md
  - About: about.md
  - Getting started: getting-started.md
  - Use cases:
      - use-cases/index.md
      - <Use case title>: use-cases/<slug>.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Data flow: concepts/data-flow.md
  - Reference:
      - CLI: reference/cli.md
      - API: reference/api.md
      - Configuration: reference/configuration.md
  - Operations:
      - Deployment: operations/deployment.md
      - Monitoring: operations/monitoring.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/<org>/<repo>
    # Add more social links as appropriate:
    # - icon: fontawesome/brands/python
    #   link: https://pypi.org/project/<package>/
    # - icon: fontawesome/brands/docker
    #   link: https://hub.docker.com/r/<org>/<image>
  generator: false              # Remove "Made with MkDocs" footer

extra_css:
  - assets/stylesheets/extra.css

extra_javascript: []
