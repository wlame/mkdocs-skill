# Organization documentation standard — GitHub Actions workflow (versioned docs, mike)
# File: .github/workflows/docs.yml
#
# Triggers:
#   pull_request / push to main → build-only check (strict)
#   push of a v* tag            → deploy that version with mike + update `latest`
#
# mike pushes rendered sites to the gh-pages branch; old versions stay deployed
# as static files and are never rebuilt.
#
# Prerequisites:
#   GitHub repo Settings → Pages → Source → Deploy from a branch → gh-pages / (root)
#   (Do NOT select "GitHub Actions" as the source — mike deploys via the branch.)
#
# First-time setup (run locally once):
#   mike deploy --push --update-aliases 1.0 latest
#   mike set-default --push latest

name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'

permissions:
  contents: write   # mike pushes to the gh-pages branch

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build docs (strict check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

  deploy:
    name: Deploy version with mike
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs
        run: |
          # v1.4.2 → docs version "1.4"; latest alias follows the newest release
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          mike deploy --push --update-aliases "$MINOR" latest
          mike set-default --push latest
